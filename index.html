<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Pengadaan - Kabupaten Kotawaringin Barat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            lpse: {
              biru: '#1a3a6b',
              biru2: '#1e4d8c',
              merah: '#e63329',
              kuning: '#f5c800',
              hijau: '#2d9e47'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    
    /* Scrollbar Kustom untuk Sidebar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="flex h-screen overflow-hidden bg-[#f0f4f8] text-gray-800">

  <aside class="w-64 border-r border-gray-200 flex flex-col flex-shrink-0 z-10 bg-white shadow-[2px_0_8px_-4px_rgba(0,0,0,0.1)]">
    
    <div class="flex flex-col items-center py-6 px-4 border-b border-gray-100">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Lambang_Kabupaten_Kotawaringin_Barat.png/400px-Lambang_Kabupaten_Kotawaringin_Barat.png" 
           alt="Logo Kabupaten Kotawaringin Barat" 
           class="w-16 h-16 mb-3 object-contain">
      <h1 class="text-[15px] font-bold text-center text-lpse-biru leading-snug">
        Dashboard Pengadaan<br>Kobar
      </h1>
    </div>

    <div class="flex-1 overflow-y-auto py-6 px-4">
      
      <div class="mb-6">
        <p class="text-xs font-semibold text-gray-400 mb-2 px-2">Dashboard</p>
        <button onclick="switchTab('view-dashboard', this)" class="menu-item w-full flex items-center px-4 py-2.5 bg-lpse-biru text-white rounded-lg font-medium text-sm transition-colors text-left shadow-sm">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
          </svg>
          Dashboard
        </button>
      </div>

      <div class="mb-6">
        <p class="text-xs font-semibold text-gray-400 mb-2 px-2">Dashboard RUP</p>
        <button onclick="switchTab('view-rup', this)" class="menu-item w-full flex items-center px-4 py-2.5 text-gray-600 hover:bg-gray-100 hover:text-lpse-biru rounded-lg text-sm transition-colors text-left">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-3 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
          </svg>
          Data RUP
        </button>
      </div>

      <div>
        <p class="text-xs font-semibold text-gray-400 mb-2 px-2">Dashboard Pengadaan</p>
        <button onclick="switchTab('view-pengadaan', this)" class="menu-item w-full flex items-center px-4 py-2.5 text-gray-600 hover:bg-gray-100 hover:text-lpse-biru rounded-lg text-sm transition-colors text-left">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-3 opacity-70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          Data Pengadaan
        </button>
      </div>

    </div>
  </aside>

  <main class="flex-1 relative bg-[#f0f4f8] flex flex-col">

    <div class="flex h-1.5 w-full flex-shrink-0">
      <div class="flex-1 bg-lpse-biru"></div>
      <div class="flex-1 bg-lpse-merah"></div>
      <div class="flex-1 bg-lpse-kuning"></div>
      <div class="flex-1 bg-lpse-hijau"></div>
    </div>

    <div id="view-dashboard" class="view-panel flex-1 overflow-y-auto p-8 lg:p-12">
      </div>

    <div id="view-rup" class="view-panel hidden flex-1 relative bg-[#f0f4f8]">
      <iframe src="rup/index.html" class="w-full h-full border-none absolute inset-0 bg-transparent"></iframe>
    </div>

    <div id="view-pengadaan" class="view-panel hidden flex-1 relative bg-[#f0f4f8]">
      <iframe src="pengadaan/index.html" class="w-full h-full border-none absolute inset-0 bg-transparent"></iframe>
    </div>

  </main>

  <script>
    function switchTab(panelId, element) {
      // 1. Sembunyikan semua area konten
      document.querySelectorAll('.view-panel').forEach(panel => {
        panel.classList.add('hidden');
      });
      
      // 2. Tampilkan panel yang diklik
      document.getElementById(panelId).classList.remove('hidden');

      // 3. Reset warna semua tombol menu ke state tidak aktif
      document.querySelectorAll('.menu-item').forEach(btn => {
        btn.classList.remove('bg-lpse-biru', 'text-white', 'shadow-sm');
        btn.classList.add('text-gray-600', 'hover:bg-gray-100');
      });

      // 4. Jadikan tombol yang diklik menjadi aktif (Biru LPSE)
      element.classList.remove('text-gray-600', 'hover:bg-gray-100');
      element.classList.add('bg-lpse-biru', 'text-white', 'shadow-sm');
    }
  </script>

</body>
</html>
