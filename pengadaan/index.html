<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekap Data Pengadaan 2026</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- SheetJS untuk export Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-2">Rekap Data Pengadaan Tahun 2026</h1>
<a href="../" class="text-blue-600 underline mb-4 inline-block">← Kembali ke Dashboard</a>

<!-- ===== KONTROL: per-page + tombol download ===== -->
<div class="flex flex-wrap gap-3 items-center mb-4">
  <label class="text-sm font-medium text-gray-700">Tampilkan:</label>
  <select id="perPage" class="border px-3 py-2 rounded text-sm">
    <option value="10" selected>10</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>
  <span class="text-sm text-gray-500">baris per halaman</span>

  <button
    id="downloadCurrent"
    class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm"
  >
    ⬇ Download Excel
  </button>

  <a
    href="../data/master_pengadaan.xlsx"
    download
    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm"
    style="text-decoration:none"
  >
    ⬇ Download Master Excel
  </a>
</div>

<!-- ===== PAGINATION ATAS ===== -->
<div class="flex gap-2 items-center mb-4">
  <button id="prevPage" class="border px-4 py-2 rounded text-sm bg-white hover:bg-gray-50 disabled:opacity-40">← Prev</button>
  <span id="pageInfo" class="px-3 py-2 text-sm text-gray-700"></span>
  <button id="nextPage" class="border px-4 py-2 rounded text-sm bg-white hover:bg-gray-50 disabled:opacity-40">Next →</button>
  <span id="totalInfo" class="text-sm text-gray-500 ml-2"></span>
</div>

<!-- ===== TABEL ===== -->
<div class="bg-white rounded shadow overflow-auto">
  <table class="min-w-full text-sm text-left border">
    <thead class="bg-gray-200">
      <tr>
        <th class="px-4 py-2 border">No</th>
        <th class="px-4 py-2 border">Kode RUP</th>
        <th class="px-4 py-2 border">Satuan Kerja</th>
        <th class="px-4 py-2 border">Nama Paket</th>
        <th class="px-4 py-2 border">Jenis Pengadaan</th>
        <th class="px-4 py-2 border">Metode Pengadaan</th>
        <th class="px-4 py-2 border">Status</th>
        <th class="px-4 py-2 border">Nilai Pagu RUP</th>
        <th class="px-4 py-2 border">Nilai HPS</th>
        <th class="px-4 py-2 border">Nilai Hasil Pemilihan</th>
        <th class="px-4 py-2 border">Efisiensi</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- ===== PAGINATION BAWAH ===== -->
<div class="flex gap-2 items-center mt-4">
  <button id="prevPage2" class="border px-4 py-2 rounded text-sm bg-white hover:bg-gray-50 disabled:opacity-40">← Prev</button>
  <span id="pageInfo2" class="px-3 py-2 text-sm text-gray-700"></span>
  <button id="nextPage2" class="border px-4 py-2 rounded text-sm bg-white hover:bg-gray-50 disabled:opacity-40">Next →</button>
</div>

<script>
let allData = [];
let currentPage = 1;
let perPage = 10;

// Format rupiah: null/kosong → "", angka → "Rp xxx"
function rupiah(n) {
  if (n === null || n === undefined || n === "" || n === " ") return "";
  return "Rp " + Number(n).toLocaleString("id-ID");
}

// Cek apakah nilai angka valid (termasuk 0)
function isAngka(val) {
  if (val === null || val === undefined || val === "" || val === " " || val === "N/A") return false;
  return !isNaN(Number(val));
}

async function loadData() {
  const res = await fetch("../data/rekap_pengadaan.json");
  allData = await res.json();
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  const start = (currentPage - 1) * perPage;
  const end   = start + perPage;
  const pageData  = allData.slice(start, end);
  const totalPage = Math.ceil(allData.length / perPage);

  pageData.forEach((row, index) => {
    const pagu  = row["Nilai Pagu RUP"];
    const hps   = row["Nilai HPS"];
    const hasil = row["Nilai Hasil Pemilihan"];

    let efisiensiStr = "N/A";
    if (isAngka(pagu) && isAngka(hasil)) {
      efisiensiStr = rupiah(Number(pagu) - Number(hasil));
    }

    const tr = document.createElement("tr");
    tr.className = `border ${index % 2 === 0 ? "bg-white" : "bg-gray-50"}`;
    tr.innerHTML = `
      <td class="px-4 py-2 border">${start + index + 1}</td>
      <td class="px-4 py-2 border">${row["Kode RUP"] ?? ""}</td>
      <td class="px-4 py-2 border">${row["Satuan Kerja"] ?? ""}</td>
      <td class="px-4 py-2 border">${row["Nama Paket"] ?? ""}</td>
      <td class="px-4 py-2 border">${row["Jenis Pengadaan"] ?? ""}</td>
      <td class="px-4 py-2 border">${row["Metode Pengadaan"] ?? ""}</td>
      <td class="px-4 py-2 border">${row["Status"] ?? ""}</td>
      <td class="px-4 py-2 border">${isAngka(pagu)  ? rupiah(pagu)  : (pagu  ?? "")}</td>
      <td class="px-4 py-2 border">${isAngka(hps)   ? rupiah(hps)   : (hps   ?? "")}</td>
      <td class="px-4 py-2 border">${isAngka(hasil) ? rupiah(hasil) : (hasil ?? "")}</td>
      <td class="px-4 py-2 border font-semibold text-green-700">${efisiensiStr}</td>
    `;
    tbody.appendChild(tr);
  });

  // Update info teks
  const infoText = `Halaman ${currentPage} / ${totalPage}`;
  document.getElementById("pageInfo").innerText  = infoText;
  document.getElementById("pageInfo2").innerText = infoText;
  document.getElementById("totalInfo").innerText = `(Total: ${allData.length} data)`;

  // Disable tombol prev/next
  const atFirst = currentPage <= 1;
  const atLast  = currentPage >= totalPage;
  document.getElementById("prevPage").disabled  = atFirst;
  document.getElementById("prevPage2").disabled = atFirst;
  document.getElementById("nextPage").disabled  = atLast;
  document.getElementById("nextPage2").disabled = atLast;
}

// ===== EVENT LISTENERS =====

document.getElementById("perPage").addEventListener("change", (e) => {
  perPage = Number(e.target.value);
  currentPage = 1;
  renderTable();
});

["prevPage", "prevPage2"].forEach(id => {
  document.getElementById(id).addEventListener("click", () => {
    if (currentPage > 1) { currentPage--; renderTable(); }
  });
});

["nextPage", "nextPage2"].forEach(id => {
  document.getElementById(id).addEventListener("click", () => {
    const totalPage = Math.ceil(allData.length / perPage);
    if (currentPage < totalPage) { currentPage++; renderTable(); }
  });
});

// Export Excel – semua data, kolom & format sama seperti tampilan web
document.getElementById("downloadCurrent").addEventListener("click", () => {

  // Susun data sesuai kolom tampilan web + kolom Efisiensi
  const exportData = allData.map((row, index) => {
    const pagu  = row["Nilai Pagu RUP"];
    const hasil = row["Nilai Hasil Pemilihan"];

    let efisiensi = "N/A";
    if (
      pagu !== "" && pagu !== "N/A" && !isNaN(Number(pagu)) &&
      hasil !== "" && hasil !== "N/A" && !isNaN(Number(hasil))
    ) {
      efisiensi = Number(pagu) - Number(hasil);
    }

    return {
      "No"                    : index + 1,
      "Kode RUP"              : row["Kode RUP"] ?? "",
      "Satuan Kerja"          : row["Satuan Kerja"] ?? "",
      "Nama Paket"            : row["Nama Paket"] ?? "",
      "Jenis Pengadaan"       : row["Jenis Pengadaan"] ?? "",
      "Metode Pengadaan"      : row["Metode Pengadaan"] ?? "",
      "Status"                : row["Status"] ?? "",
      "Nilai Pagu RUP"        : isNaN(Number(pagu)) ? (pagu ?? "") : Number(pagu),
      "Nilai HPS"             : isNaN(Number(row["Nilai HPS"])) ? (row["Nilai HPS"] ?? "") : Number(row["Nilai HPS"]),
      "Nilai Hasil Pemilihan" : hasil === "N/A" || hasil === "" ? (hasil ?? "") : Number(hasil),
      "Efisiensi"             : efisiensi,
    };
  });

  const ws = XLSX.utils.json_to_sheet(exportData);

  // Format rupiah untuk kolom angka
  const kolomRupiah = ["Nilai Pagu RUP", "Nilai HPS", "Nilai Hasil Pemilihan", "Efisiensi"];
  const range   = XLSX.utils.decode_range(ws['!ref']);
  const headers = [];
  for (let c = range.s.c; c <= range.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({ r: 0, c })];
    headers[c] = cell ? cell.v : "";
  }
  for (let r = 1; r <= range.e.r; r++) {
    for (let c = range.s.c; c <= range.e.c; c++) {
      if (kolomRupiah.includes(headers[c])) {
        const addr = XLSX.utils.encode_cell({ r, c });
        if (ws[addr] && typeof ws[addr].v === "number") {
          ws[addr].z = '#,##0';
        }
      }
    }
  }

  // Lebar kolom
  ws['!cols'] = [
    { wch: 6  }, // No
    { wch: 16 }, // Kode RUP
    { wch: 35 }, // Satuan Kerja
    { wch: 50 }, // Nama Paket
    { wch: 30 }, // Jenis Pengadaan
    { wch: 22 }, // Metode Pengadaan
    { wch: 22 }, // Status
    { wch: 20 }, // Nilai Pagu RUP
    { wch: 20 }, // Nilai HPS
    { wch: 20 }, // Nilai Hasil Pemilihan
    { wch: 20 }, // Efisiensi
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Pengadaan");
  XLSX.writeFile(wb, `Rekap Pengadaan 2026.xlsx`);
});

loadData();
</script>
</body>
</html>
